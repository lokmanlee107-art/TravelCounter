<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="🇭🇰 旅遊記帳">
    <link rel="apple-touch-icon" href="app-icon.png"> <title>🇭🇰 旅遊記帳 (完整終極版)</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 520px; box-sizing: border-box; margin-top: 10px;}
        .hero { background: linear-gradient(135deg, #1f6feb, #3b82f6); color: white; padding: 16px; border-radius: 12px; margin-bottom: 14px; }
        .hero h2 { margin: 0 0 6px; font-size: 1.35rem; }
        .hero p { margin: 0; font-size: 0.9rem; opacity: 0.95; }
        .overview { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin: 12px 0 16px; }
        .overview-card { background: #f7f9fc; border: 1px solid #d9e2ec; border-radius: 10px; padding: 10px 12px; }
        .overview-card .label { color: #5b6b7a; font-size: 0.78rem; }
        .overview-card .value { color: #1f2d3d; font-size: 1.1rem; font-weight: 700; margin-top: 2px; }
        .section-title { font-size: 0.9rem; font-weight: 700; color: #334155; margin: 10px 0 8px; }
        .filter-bar { background: #f8fafc; border: 1px solid #dbe5f0; border-radius: 10px; padding: 10px; margin-bottom: 10px; }
        .filter-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 8px; }
        .filter-control { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 13px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-bottom: 10px; }
        .stat-card { background: #f8fafc; border: 1px solid #dbe5f0; border-radius: 10px; padding: 10px; }
        .stat-card .k { color: #64748b; font-size: 0.78rem; }
        .stat-card .v { color: #0f172a; font-size: 1rem; font-weight: 700; margin-top: 2px; }
        
        .panel { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: none; }
        .panel h4 { margin-top: 0; color: #555; margin-bottom: 10px; }
        
        .rate-input { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 14px; }
        .rate-input input { width: 80px; padding: 5px; }

        .btn-toggle { background: #64748b; color: white; border: none; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; margin-bottom: 10px; font-weight: 600; }
        .top-buttons { display: flex; gap: 10px; margin-bottom: 10px; }
        
        /* 編輯模式的視覺提示 */
        .input-group { background: #e3f2fd; padding: 15px; border-radius: 10px; margin-bottom: 20px; transition: 0.3s; }
        .input-group.edit-mode { background: #fff3e0; border: 2px dashed #f39c12; }

        input[type="text"], input[type="number"], select { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; width: 100%; box-sizing: border-box; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .row > * { flex: 1; }
        
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; background: white; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        .checkbox-group label { display: flex; align-items: center; gap: 5px; font-size: 14px; cursor: pointer; }
        
        .person-tag { display: inline-flex; align-items: center; background: #e0e0e0; padding: 5px 10px; border-radius: 15px; font-size: 13px; margin: 5px; }
        .person-tag button { background: none; border: none; color: #e74c3c; margin-left: 5px; cursor: pointer; font-weight: bold; }

        button.primary-btn { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .empty-state { text-align: center; color: #64748b; background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: 10px; padding: 18px 10px; margin-top: 8px; font-size: 0.92rem; }
        .hkd-amount { color: #d35400; font-weight: bold; font-size: 1.1rem; }
        
        /* 操作按鈕 (編輯/刪除) */
        .item-actions { display: flex; flex-direction: column; gap: 5px; align-items: flex-end; margin-left: 10px; }
        .edit-btn { background: #f1c40f; color: #333; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; }
        
        .people-list { font-size: 0.8rem; color: #3498db; margin-top: 3px; }
        .payer-badge { font-size: 0.75rem; background: #f39c12; color: white; padding: 2px 6px; border-radius: 4px; margin-bottom: 4px; display: inline-block; }
        
        .total-section { margin-top: 20px; padding: 15px; background: #34495e; color: white; border-radius: 10px; text-align: center; }
        .total-amount { font-size: 1.8rem; font-weight: bold; color: #f1c40f; }

        .action-buttons { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .export-btn { flex: 1 1 45%; padding: 12px; background-color: #8e44ad; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .excel-btn { flex: 1 1 45%; padding: 12px; background-color: #0f766e; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .png-btn { flex: 1 1 45%; padding: 12px; background-color: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .settle-btn { flex: 1 1 45%; padding: 12px; background-color: #e67e22; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }

        /* 一鍵清空按鈕 */
        .clear-btn { width: 100%; padding: 12px; background-color: #c0392b; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; margin-top: 10px; }
        .clear-btn:hover { background-color: #a53125; }

        /* 人性化結算樣式 */
        #settlement-panel { background: #fff8e1; border: 2px solid #ffa000; }
        .debtor-card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #e67e22; }
        .debtor-name { font-size: 1.1rem; font-weight: bold; color: #333; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .debt-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .creditor-info { font-size: 1rem; color: #555; font-weight: bold; }
        .debt-amount { color: #d35400; font-weight: bold; font-size: 1.1rem; }
        .debt-reason { font-size: 0.8rem; color: #888; display: block; margin-top: 2px; line-height: 1.2; }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <h2>🇭🇰 旅遊分單記帳本</h2>
        <p>三步完成：新增旅伴 → 記帳 → 檢視結算，介面更直觀易明。</p>
    </div>
    
    <div class="overview">
        <div class="overview-card">
            <div class="label">目前旅伴人數</div>
            <div class="value" id="overview-people">0 人</div>
        </div>
        <div class="overview-card">
            <div class="label">已記錄項目數</div>
            <div class="value" id="overview-expenses">0 筆</div>
        </div>
    </div>
    
    <div class="top-buttons">
        <button class="btn-toggle" onclick="togglePanel('settings')">⚙️ 匯率設定</button>
        <button class="btn-toggle" onclick="togglePanel('people-panel')">👥 管理旅伴</button>
    </div>
    
    <div id="settings" class="panel">
        <h4>自定義匯率 (1 外幣 = ? HKD)</h4>
        <div id="rate-inputs-container"></div>
        <button onclick="saveRates()" style="width:100%; padding: 8px; background:#3498db; color:white; border:none; border-radius:5px; cursor:pointer; margin-top:10px;">儲存匯率</button>
    </div>

    <div id="people-panel" class="panel">
        <h4>新增旅伴人名</h4>
        <div class="row">
            <input type="text" id="new-person-name" placeholder="輸入名字 (如: 小明)">
            <button onclick="addPerson()" style="background:#3498db; color:white; border:none; border-radius:5px; padding:0 15px; cursor:pointer;">新增</button>
        </div>
        <div id="people-tags-container" style="margin-top: 10px;"></div>
    </div>

    <div id="settlement-panel" class="panel">
        <h4 style="text-align:center; color:#d35400;">💰 結算清單 (誰該給誰)</h4>
        <div id="settlement-results"></div>
    </div>

    <div class="section-title">🧾 Step 1：新增一筆消費</div>
    <div class="input-group" id="input-group">
        <div class="row">
            <input type="text" id="item-name" placeholder="項目 (如：的士)">
        </div>
        <div class="row">
            <select id="currency-select"></select>
            <input type="number" id="item-amount" placeholder="金額">
        </div>
        
        <div class="row" style="align-items: center; margin-bottom: 10px;">
            <span style="font-size: 14px; color: #555; white-space: nowrap;">💳 誰代墊：</span>
            <select id="payer-select"></select>
        </div>
        
        <div style="font-size: 14px; color: #555; margin-bottom: 5px;">✅ 誰要平分這筆錢：</div>
        <div id="checkbox-container" class="checkbox-group"></div>

        <button id="add-btn" class="primary-btn">新增紀錄</button>
    </div>

    <div class="section-title">📚 Step 2：消費紀錄列表</div>
    <div class="filter-bar">
        <div class="filter-grid">
            <input id="search-keyword" class="filter-control" type="text" placeholder="搜尋項目/分攤人...">
            <select id="filter-payer" class="filter-control">
                <option value="">全部付款人</option>
            </select>
            <select id="sort-mode" class="filter-control">
                <option value="latest">最新優先</option>
                <option value="amount_desc">金額高→低</option>
                <option value="amount_asc">金額低→高</option>
            </select>
        </div>
    </div>
    <div id="stats-panel" class="stats-grid"></div>
    <div id="expense-list"></div>

    <div class="total-section">
        <div>總支出 (HKD)</div>
        <div class="total-amount">HK$ <span id="total-sum">0</span></div>
    </div>

    <div class="action-buttons">
        <button class="export-btn" onclick="exportToCSV()">📊 匯出 CSV</button>
        <button class="excel-btn" onclick="exportDetailedExcel()">📗 匯出詳細 Excel</button>
        <button class="png-btn" onclick="exportSimplePNG()">🖼️ 匯出簡單 PNG</button>
        <button class="settle-btn" onclick="showSettlement()">💰 檢視結算</button>
    </div>
    
    <button class="clear-btn" onclick="clearAllExpenses()">🗑️ 一鍵清空 (開啟新旅程)</button>
</div>

<script>
    const defaultRates = { "JPY": 0.052, "USD": 7.8, "KRW": 0.0055, "EUR": 8.4, "TWD": 0.25, "RMB": 1.08, "HKD": 1.0 };
    let savedRates = JSON.parse(localStorage.getItem('travel_rates_hk')) || {};
    let rates = { ...defaultRates, ...savedRates };
    
    let peopleList = JSON.parse(localStorage.getItem('travel_people_hk')) || ["我自己"];
    let expenses = JSON.parse(localStorage.getItem('travel_data_hk')) || [];
    
    let editingId = null;

    initRateSettings();
    updateCurrencyDropdown();
    renderPeoplePanel();
    updatePayerDropdown(); 
    updateFilterPayerOptions();
    renderCheckboxes();
    migrateLegacyData();
    renderExpenses();
    updateOverview();

    document.getElementById('search-keyword').addEventListener('input', renderExpenses);
    document.getElementById('filter-payer').addEventListener('change', renderExpenses);
    document.getElementById('sort-mode').addEventListener('change', renderExpenses);

    function migrateLegacyData() {
        let changed = false;
        expenses = expenses.map(item => {
            if (!item.createdAt) {
                changed = true;
                return { ...item, createdAt: item.id || Date.now() };
            }
            return item;
        });
        if (changed) {
            localStorage.setItem('travel_data_hk', JSON.stringify(expenses));
        }
    }

    function updateOverview() {
        document.getElementById('overview-people').innerText = `${peopleList.length} 人`;
        document.getElementById('overview-expenses').innerText = `${expenses.length} 筆`;
    }

    function togglePanel(panelId) {
        document.getElementById('settings').style.display = 'none';
        document.getElementById('people-panel').style.display = 'none';
        document.getElementById('settlement-panel').style.display = 'none';
        const panel = document.getElementById(panelId);
        panel.style.display = 'block';
    }

    function initRateSettings() {
        const container = document.getElementById('rate-inputs-container');
        container.innerHTML = '';
        for (let cur in rates) {
            if (cur === "HKD") continue;
            container.innerHTML += `<div class="rate-input"><span>${cur}:</span><input type="number" step="0.0001" id="rate-${cur}" value="${rates[cur]}"></div>`;
        }
    }

    function saveRates() {
        for (let cur in rates) {
            if (cur === "HKD") continue;
            rates[cur] = parseFloat(document.getElementById(`rate-${cur}`).value);
        }
        localStorage.setItem('travel_rates_hk', JSON.stringify(rates));
        updateCurrencyDropdown();
        alert("匯率已更新！");
        document.getElementById('settings').style.display = 'none';
    }

    function updateCurrencyDropdown() {
        const select = document.getElementById('currency-select');
        select.innerHTML = '';
        for (let cur in rates) {
            const option = document.createElement('option');
            option.value = rates[cur];
            option.textContent = `${cur} (匯率:${rates[cur]})`;
            select.appendChild(option);
        }
    }

    function updatePayerDropdown() {
        const select = document.getElementById('payer-select');
        const previousValue = select.value;
        select.innerHTML = '';

        peopleList.forEach(name => {
            const option = document.createElement('option');
            option.value = name;
            option.textContent = name;
            select.appendChild(option);
        });

        if (peopleList.includes(previousValue)) {
            select.value = previousValue;
        }
    }

    function updateFilterPayerOptions() {
        const select = document.getElementById('filter-payer');
        const previous = select.value;
        select.innerHTML = '<option value="">全部付款人</option>';
        peopleList.forEach(name => {
            const option = document.createElement('option');
            option.value = name;
            option.textContent = name;
            select.appendChild(option);
        });
        if (peopleList.includes(previous)) {
            select.value = previous;
        }
    }

    function addPerson() {
        const nameInput = document.getElementById('new-person-name');
        const name = nameInput.value.trim();
        if (name && !peopleList.includes(name)) {
            peopleList.push(name);
            savePeopleData();
            nameInput.value = '';
        } else if (peopleList.includes(name)) {
            alert("這個名字已經存在囉！");
        }
    }

    function deletePerson(name) {
        if (!confirm(`確定要刪除 ${name} 嗎？這不會刪除已記的帳，但可能會影響顯示。`)) return;
        peopleList = peopleList.filter(p => p !== name);
        savePeopleData();
    }

    function savePeopleData() {
        localStorage.setItem('travel_people_hk', JSON.stringify(peopleList));
        renderPeoplePanel();
        renderCheckboxes();
        updatePayerDropdown(); 
        updateFilterPayerOptions();
        updateOverview();
    }

    function renderPeoplePanel() {
        const container = document.getElementById('people-tags-container');
        container.innerHTML = '';
        peopleList.forEach(name => {
            const tag = document.createElement('div');
            tag.className = 'person-tag';

            const nameText = document.createTextNode(name + ' ');
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'x';
            deleteBtn.addEventListener('click', () => deletePerson(name));

            tag.appendChild(nameText);
            tag.appendChild(deleteBtn);
            container.appendChild(tag);
        });
    }

    function escapeHTML(text) {
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function renderCheckboxes() {
        const container = document.getElementById('checkbox-container');
        container.innerHTML = '';
        if (peopleList.length === 0) {
            container.innerHTML = '<span style="color:#e74c3c; font-size:14px;">請先新增人員！</span>';
            return;
        }

        peopleList.forEach(name => {
            const label = document.createElement('label');
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'person-cb';
            checkbox.value = name;
            checkbox.checked = true;

            label.appendChild(checkbox);
            label.appendChild(document.createTextNode(` ${name}`));
            container.appendChild(label);
        });
    }

    document.getElementById('add-btn').addEventListener('click', () => {
        const name = document.getElementById('item-name').value.trim();
        const rawAmount = parseFloat(document.getElementById('item-amount').value);
        const rate = parseFloat(document.getElementById('currency-select').value);
        const curName = document.getElementById('currency-select').selectedOptions[0].text.split(' ')[0];
        const payer = document.getElementById('payer-select').value; 

        const checkboxes = document.querySelectorAll('.person-cb:checked');
        const selectedPeople = Array.from(checkboxes).map(cb => cb.value);

        if (!name || isNaN(rawAmount)) {
            alert("請填寫完整的項目與金額！"); return;
        }
        if (selectedPeople.length === 0) {
            alert("請至少勾選一位分擔的人員！"); return;
        }
        if (!payer) {
            alert("請選擇是誰代墊的！"); return;
        }

        const hkdTotal = parseFloat((rawAmount * rate).toFixed(1)); 
        
        if (editingId) {
            const index = expenses.findIndex(item => item.id === editingId);
            if (index !== -1) {
                expenses[index] = {
                    ...expenses[index],
                    name, curName, rawAmount, hkdTotal, payer,
                    createdAt: expenses[index].createdAt || expenses[index].id || Date.now(),
                    peopleList: selectedPeople,
                    peopleCount: selectedPeople.length 
                };
            }
            cancelEditMode();
        } else {
            const entry = { 
                id: Date.now(), 
                createdAt: Date.now(),
                name, curName, rawAmount, hkdTotal, payer, 
                peopleList: selectedPeople,
                peopleCount: selectedPeople.length 
            };
            expenses.push(entry);
        }
        
        localStorage.setItem('travel_data_hk', JSON.stringify(expenses));
        renderExpenses();
        
        document.getElementById('item-name').value = '';
        document.getElementById('item-amount').value = '';
        renderCheckboxes(); 
    });

    function editItem(id) {
        const item = expenses.find(i => i.id === id);
        if (!item) return;

        editingId = id; 

        document.getElementById('item-name').value = item.name;
        document.getElementById('item-amount').value = item.rawAmount;
        document.getElementById('payer-select').value = item.payer;

        const currencySelect = document.getElementById('currency-select');
        for (let i = 0; i < currencySelect.options.length; i++) {
            if (currencySelect.options[i].text.startsWith(item.curName)) {
                currencySelect.selectedIndex = i;
                break;
            }
        }

        const checkboxes = document.querySelectorAll('.person-cb');
        checkboxes.forEach(cb => {
            cb.checked = item.peopleList.includes(cb.value);
        });

        const btn = document.getElementById('add-btn');
        btn.innerText = "💾 更新紀錄";
        btn.style.backgroundColor = "#f39c12"; 
        document.getElementById('input-group').classList.add('edit-mode');

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEditMode() {
        editingId = null;
        const btn = document.getElementById('add-btn');
        btn.innerText = "新增紀錄";
        btn.style.backgroundColor = "#2ecc71"; 
        document.getElementById('input-group').classList.remove('edit-mode');
    }

    function deleteItem(id) {
        if(!confirm("確定刪除這筆紀錄？")) return;
        expenses = expenses.filter(i => i.id !== id);
        localStorage.setItem('travel_data_hk', JSON.stringify(expenses));
        renderExpenses();
        if (editingId === id) cancelEditMode();
    }

    function clearAllExpenses() {
        if (expenses.length === 0) {
            alert("目前沒有任何紀錄喔！");
            return;
        }
        
        const warningMessage = "⚠️ 警告：確定要清空所有紀錄嗎？\n\n強烈建議您在清空前先點擊「📊 匯出 CSV」備份。\n點擊「確定」將會刪除所有帳目且無法復原！";
        
        if (confirm(warningMessage)) {
            expenses = [];
            localStorage.removeItem('travel_data_hk');
            document.getElementById('settlement-panel').style.display = 'none';
            renderExpenses();
            cancelEditMode(); 
            alert("紀錄已清空，祝您下一趟旅程愉快！✈️");
        }
    }

    function getFilteredExpenses() {
        const keyword = document.getElementById('search-keyword').value.trim().toLowerCase();
        const payerFilter = document.getElementById('filter-payer').value;
        const sortMode = document.getElementById('sort-mode').value;

        let result = expenses.filter(item => {
            const searchable = `${item.name} ${item.payer} ${item.peopleList.join(' ')}`.toLowerCase();
            const matchesKeyword = !keyword || searchable.includes(keyword);
            const matchesPayer = !payerFilter || item.payer === payerFilter;
            return matchesKeyword && matchesPayer;
        });

        if (sortMode === 'amount_desc') {
            result.sort((a, b) => b.hkdTotal - a.hkdTotal);
        } else if (sortMode === 'amount_asc') {
            result.sort((a, b) => a.hkdTotal - b.hkdTotal);
        } else {
            result.sort((a, b) => (b.createdAt || b.id) - (a.createdAt || a.id));
        }

        return result;
    }

    function createStatCard(label, value) {
        return `<div class="stat-card"><div class="k">${label}</div><div class="v">${value}</div></div>`;
    }

    function renderStats(filteredExpenses) {
        const panel = document.getElementById('stats-panel');
        const filteredTotal = filteredExpenses.reduce((sum, i) => sum + i.hkdTotal, 0);
        const avg = filteredExpenses.length ? (filteredTotal / filteredExpenses.length).toFixed(1) : '0.0';
        panel.innerHTML = [
            createStatCard('目前篩選筆數', `${filteredExpenses.length} 筆`),
            createStatCard('目前篩選總額', `HK$ ${filteredTotal.toFixed(1)}`),
            createStatCard('平均每筆', `HK$ ${avg}`),
            createStatCard('全部總筆數', `${expenses.length} 筆`)
        ].join('');
    }

    function createExpenseItemElement(item) {
        const perPerson = (item.hkdTotal / item.peopleCount).toFixed(1);
        const peopleStr = escapeHTML(item.peopleList.join(', '));
        const safePayer = escapeHTML(item.payer);
        const safeName = escapeHTML(item.name);
        const safeCurName = escapeHTML(item.curName);
        const dateStr = new Date(item.createdAt || item.id).toLocaleDateString('zh-HK');

        const wrapper = document.createElement('div');
        wrapper.className = 'item';
        wrapper.innerHTML = `
            <div style="flex:1;">
                <div class="payer-badge">💳 ${safePayer} 先付</div>
                <div class="item-name" style="font-weight:bold; color:#333;">${safeName}</div>
                <small style="color:#777;">${item.rawAmount} ${safeCurName} ｜ ${dateStr}</small>
                <div class="people-list">🙋‍♂️ 分攤: ${peopleStr}</div>
            </div>
            <div style="text-align:right">
                <span class="hkd-amount">HK$ ${item.hkdTotal}</span><br>
                <small>每人 HK$ ${perPerson}</small>
            </div>
        `;

        const actions = document.createElement('div');
        actions.className = 'item-actions';

        const editBtn = document.createElement('button');
        editBtn.className = 'edit-btn';
        editBtn.textContent = '✏️';
        editBtn.addEventListener('click', () => editItem(item.id));

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = '✖️';
        deleteBtn.addEventListener('click', () => deleteItem(item.id));

        actions.appendChild(editBtn);
        actions.appendChild(deleteBtn);
        wrapper.appendChild(actions);

        return wrapper;
    }

    function renderEmptyExpenseState(message) {
        const list = document.getElementById('expense-list');
        list.innerHTML = `<div class="empty-state">${message}</div>`;
    }

    function renderExpenses() {
        const list = document.getElementById('expense-list');
        list.innerHTML = '';

        if (expenses.length === 0) {
            renderStats([]);
            renderEmptyExpenseState('目前尚未有消費記錄，請先在上方新增第一筆 ✍️');
            document.getElementById('total-sum').innerText = '0.0';
            updateOverview();
            return;
        }

        const filteredExpenses = getFilteredExpenses();
        renderStats(filteredExpenses);

        if (filteredExpenses.length === 0) {
            renderEmptyExpenseState('找不到符合篩選條件的記錄 🔍');
            const overallTotal = expenses.reduce((sum, i) => sum + i.hkdTotal, 0);
            document.getElementById('total-sum').innerText = overallTotal.toFixed(1);
            updateOverview();
            return;
        }

        let displayTotal = 0;
        filteredExpenses.forEach(item => {
            displayTotal += item.hkdTotal;
            list.appendChild(createExpenseItemElement(item));
        });

        document.getElementById('total-sum').innerText = displayTotal.toFixed(1);
        updateOverview();
    }


    function showSettlement() {
        if (expenses.length === 0) {
            alert("還沒有記帳紀錄喔！"); return;
        }

        let pairwiseDebts = {};
        let debtDetails = {}; 

        let allInvolvedPeople = new Set(peopleList);
        expenses.forEach(e => {
            allInvolvedPeople.add(e.payer);
            e.peopleList.forEach(p => allInvolvedPeople.add(p));
        });
        let uniquePeople = Array.from(allInvolvedPeople);

        uniquePeople.forEach(p => {
            pairwiseDebts[p] = {};
            debtDetails[p] = {};
            uniquePeople.forEach(p2 => {
                if (p !== p2) {
                    pairwiseDebts[p][p2] = 0;
                    debtDetails[p][p2] = [];
                }
            });
        });

        expenses.forEach(exp => {
            const splitAmount = exp.hkdTotal / exp.peopleCount;
            const payer = exp.payer;
            
            exp.peopleList.forEach(person => {
                if (person !== payer) {
                    pairwiseDebts[person][payer] += splitAmount;
                    debtDetails[person][payer].push(exp.name);
                }
            });
        });

        let finalDebts = {}; 
        let processedPairs = new Set();

        uniquePeople.forEach(p1 => {
            uniquePeople.forEach(p2 => {
                if (p1 === p2) return;
                
                let pairKey = [p1, p2].sort().join('-');
                if (processedPairs.has(pairKey)) return;
                processedPairs.add(pairKey);

                let p1OwesP2 = pairwiseDebts[p1][p2];
                let p2OwesP1 = pairwiseDebts[p2][p1];
                let net = p1OwesP2 - p2OwesP1;
                
                let allReasons = [...debtDetails[p1][p2], ...debtDetails[p2][p1]];
                let uniqueReasons = [...new Set(allReasons)].slice(0, 5).join(", ");
                if (allReasons.length > 5) uniqueReasons += "...等";

                if (net > 0.5) {
                    if (!finalDebts[p1]) finalDebts[p1] = [];
                    finalDebts[p1].push({ creditor: p2, amount: net, reasons: uniqueReasons });
                } else if (net < -0.5) {
                    if (!finalDebts[p2]) finalDebts[p2] = [];
                    finalDebts[p2].push({ creditor: p1, amount: Math.abs(net), reasons: uniqueReasons });
                }
            });
        });

        const resultsContainer = document.getElementById('settlement-results');
        resultsContainer.innerHTML = '';

        if (Object.keys(finalDebts).length === 0) {
            resultsContainer.innerHTML = "<p style='text-align:center; color:#27ae60; font-weight:bold; padding:20px;'>🎉 完美！大家互不相欠！</p>";
        } else {
            for (let debtor in finalDebts) {
                const debtList = finalDebts[debtor];
                const card = document.createElement('div');
                card.className = 'debtor-card';

                const debtorName = document.createElement('div');
                debtorName.className = 'debtor-name';
                debtorName.textContent = `👤 ${debtor} 需要支付：`;
                card.appendChild(debtorName);

                debtList.forEach(d => {
                    const row = document.createElement('div');
                    row.className = 'debt-row';

                    const creditorInfo = document.createElement('div');
                    creditorInfo.className = 'creditor-info';
                    creditorInfo.textContent = `➡️ 給 ${d.creditor}`;

                    const reason = document.createElement('span');
                    reason.className = 'debt-reason';
                    reason.textContent = `(${d.reasons || '雜項'})`;
                    creditorInfo.appendChild(reason);

                    const amount = document.createElement('div');
                    amount.className = 'debt-amount';
                    amount.textContent = `HK$ ${d.amount.toFixed(1)}`;

                    row.appendChild(creditorInfo);
                    row.appendChild(amount);
                    card.appendChild(row);
                });

                resultsContainer.appendChild(card);
            }
        }

        togglePanel('settlement-panel');
        document.getElementById('settlement-panel').scrollIntoView({ behavior: 'smooth' });
    }



    function downloadBlob(blob, fileName) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", fileName);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    function exportDetailedExcel() {
        if (expenses.length === 0) {
            alert("目前沒有任何紀錄可以匯出喔！"); return;
        }

        const escapeXml = (value) => String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&apos;');

        const rows = expenses.map((item, idx) => {
            const perPerson = (item.hkdTotal / item.peopleCount).toFixed(1);
            const people = item.peopleList.join(', ');
            return `
            <Row>
                <Cell><Data ss:Type="Number">${idx + 1}</Data></Cell>
                <Cell><Data ss:Type="String">${escapeXml(item.name)}</Data></Cell>
                <Cell><Data ss:Type="String">${escapeXml(item.curName)}</Data></Cell>
                <Cell><Data ss:Type="Number">${item.rawAmount}</Data></Cell>
                <Cell><Data ss:Type="Number">${item.hkdTotal}</Data></Cell>
                <Cell><Data ss:Type="String">${escapeXml(item.payer)}</Data></Cell>
                <Cell><Data ss:Type="Number">${item.peopleCount}</Data></Cell>
                <Cell><Data ss:Type="String">${escapeXml(people)}</Data></Cell>
                <Cell><Data ss:Type="Number">${perPerson}</Data></Cell>
            </Row>`;
        }).join('');

        const total = expenses.reduce((sum, item) => sum + item.hkdTotal, 0).toFixed(1);

        const workbookXml = `<?xml version="1.0"?>
        <?mso-application progid="Excel.Sheet"?>
        <Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
            xmlns:o="urn:schemas-microsoft-com:office:office"
            xmlns:x="urn:schemas-microsoft-com:office:excel"
            xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
            <Worksheet ss:Name="旅遊記帳明細">
                <Table>
                    <Row>
                        <Cell><Data ss:Type="String">序號</Data></Cell>
                        <Cell><Data ss:Type="String">項目名稱</Data></Cell>
                        <Cell><Data ss:Type="String">幣別</Data></Cell>
                        <Cell><Data ss:Type="String">外幣金額</Data></Cell>
                        <Cell><Data ss:Type="String">港幣總計</Data></Cell>
                        <Cell><Data ss:Type="String">付款人</Data></Cell>
                        <Cell><Data ss:Type="String">分攤人數</Data></Cell>
                        <Cell><Data ss:Type="String">參與人員</Data></Cell>
                        <Cell><Data ss:Type="String">每人分攤港幣</Data></Cell>
                    </Row>
                    ${rows}
                    <Row>
                        <Cell><Data ss:Type="String">總支出(HKD)</Data></Cell>
                        <Cell/><Cell/><Cell/>
                        <Cell><Data ss:Type="Number">${total}</Data></Cell>
                        <Cell/><Cell/><Cell/><Cell/>
                    </Row>
                </Table>
            </Worksheet>
        </Workbook>`;

        const blob = new Blob([workbookXml], { type: 'application/vnd.ms-excel;charset=utf-8;' });
        downloadBlob(blob, 'HK_travel_expenses_detailed.xls');
    }

    function exportSimplePNG() {
        if (expenses.length === 0) {
            alert("目前沒有任何紀錄可以匯出喔！"); return;
        }

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const width = 900;
        const rowHeight = 44;
        const maxRows = 12;
        const shown = expenses.slice(-maxRows).reverse();
        const total = expenses.reduce((sum, item) => sum + item.hkdTotal, 0).toFixed(1);
        const height = 220 + shown.length * rowHeight;

        canvas.width = width;
        canvas.height = height;

        ctx.fillStyle = '#f1f5f9';
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = '#1d4ed8';
        ctx.fillRect(0, 0, width, 92);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 34px "Microsoft JhengHei"';
        ctx.fillText('旅遊記帳簡報', 34, 50);
        ctx.font = '22px "Microsoft JhengHei"';
        ctx.fillText(`總支出 HK$ ${total} ｜ 共 ${expenses.length} 筆`, 34, 80);

        ctx.fillStyle = '#0f172a';
        ctx.font = 'bold 24px "Microsoft JhengHei"';
        ctx.fillText('最近記錄', 34, 130);

        ctx.font = '20px "Microsoft JhengHei"';
        shown.forEach((item, i) => {
            const y = 170 + i * rowHeight;
            ctx.fillStyle = i % 2 === 0 ? '#ffffff' : '#f8fafc';
            ctx.fillRect(28, y - 28, width - 56, 36);
            ctx.fillStyle = '#334155';
            const line = `${item.name}｜${item.payer} 先付｜HK$ ${item.hkdTotal}`;
            ctx.fillText(line.slice(0, 58), 40, y);
        });

        canvas.toBlob((blob) => {
            if (!blob) {
                alert('PNG 匯出失敗，請稍後再試。');
                return;
            }
            downloadBlob(blob, 'HK_travel_summary.png');
        }, 'image/png');
    }

    function exportToCSV() {
        if (expenses.length === 0) {
            alert("目前沒有任何紀錄可以匯出喔！"); return;
        }

        let csvContent = "\uFEFF"; 
        csvContent += "項目名稱,幣別,外幣金額,港幣總計,付款人,分攤人數,參與人員,每人分攤港幣\n";

        expenses.forEach(item => {
            let perPerson = (item.hkdTotal / item.peopleCount).toFixed(1);
            let safeName = `"${item.name.replace(/"/g, '""')}"`; 
            let safePeople = `"${item.peopleList.join(', ')}"`;
            let row = `${safeName},${item.curName},${item.rawAmount},${item.hkdTotal},${item.payer},${item.peopleCount},${safePeople},${perPerson}`;
            csvContent += row + "\n";
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        downloadBlob(blob, "HK_travel_expenses.csv"); 
    }
