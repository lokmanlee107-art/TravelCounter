<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="🇭🇰 旅遊記帳">
    <link rel="apple-touch-icon" href="app-icon.png"> <title>🇭🇰 旅遊記帳 (完整終極版)</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 480px; box-sizing: border-box; margin-top: 10px;}
        
        .panel { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: none; }
        .panel h4 { margin-top: 0; color: #555; margin-bottom: 10px; }
        
        .rate-input { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 14px; }
        .rate-input input { width: 80px; padding: 5px; }

        .btn-toggle { background: #95a5a6; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; margin-bottom: 10px; }
        .top-buttons { display: flex; gap: 10px; margin-bottom: 10px; }
        
        /* 編輯模式的視覺提示 */
        .input-group { background: #e3f2fd; padding: 15px; border-radius: 10px; margin-bottom: 20px; transition: 0.3s; }
        .input-group.edit-mode { background: #fff3e0; border: 2px dashed #f39c12; }

        input[type="text"], input[type="number"], select { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; width: 100%; box-sizing: border-box; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .row > * { flex: 1; }
        
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; background: white; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        .checkbox-group label { display: flex; align-items: center; gap: 5px; font-size: 14px; cursor: pointer; }
        
        .person-tag { display: inline-flex; align-items: center; background: #e0e0e0; padding: 5px 10px; border-radius: 15px; font-size: 13px; margin: 5px; }
        .person-tag button { background: none; border: none; color: #e74c3c; margin-left: 5px; cursor: pointer; font-weight: bold; }

        button.primary-btn { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .hkd-amount { color: #d35400; font-weight: bold; font-size: 1.1rem; }
        
        /* 操作按鈕 (編輯/刪除) */
        .item-actions { display: flex; flex-direction: column; gap: 5px; align-items: flex-end; margin-left: 10px; }
        .edit-btn { background: #f1c40f; color: #333; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; }
        
        .people-list { font-size: 0.8rem; color: #3498db; margin-top: 3px; }
        .payer-badge { font-size: 0.75rem; background: #f39c12; color: white; padding: 2px 6px; border-radius: 4px; margin-bottom: 4px; display: inline-block; }
        
        .total-section { margin-top: 20px; padding: 15px; background: #34495e; color: white; border-radius: 10px; text-align: center; }
        .total-amount { font-size: 1.8rem; font-weight: bold; color: #f1c40f; }

        .action-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .export-btn { flex: 1; padding: 12px; background-color: #8e44ad; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .settle-btn { flex: 1; padding: 12px; background-color: #e67e22; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }

        /* 一鍵清空按鈕 */
        .clear-btn { width: 100%; padding: 12px; background-color: #c0392b; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; margin-top: 10px; }
        .clear-btn:hover { background-color: #a53125; }

        /* 人性化結算樣式 */
        #settlement-panel { background: #fff8e1; border: 2px solid #ffa000; }
        .debtor-card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #e67e22; }
        .debtor-name { font-size: 1.1rem; font-weight: bold; color: #333; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .debt-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .creditor-info { font-size: 1rem; color: #555; font-weight: bold; }
        .debt-amount { color: #d35400; font-weight: bold; font-size: 1.1rem; }
        .debt-reason { font-size: 0.8rem; color: #888; display: block; margin-top: 2px; line-height: 1.2; }
    </style>
</head>
<body>

<div class="container">
    <h2>🇭🇰 旅遊分單記帳本</h2>
    
    <div class="top-buttons">
        <button class="btn-toggle" onclick="togglePanel('settings')">⚙️ 匯率設定</button>
        <button class="btn-toggle" onclick="togglePanel('people-panel')">👥 管理旅伴</button>
    </div>
    
    <div id="settings" class="panel">
        <h4>自定義匯率 (1 外幣 = ? HKD)</h4>
        <div id="rate-inputs-container"></div>
        <button onclick="saveRates()" style="width:100%; padding: 8px; background:#3498db; color:white; border:none; border-radius:5px; cursor:pointer; margin-top:10px;">儲存匯率</button>
    </div>

    <div id="people-panel" class="panel">
        <h4>新增旅伴人名</h4>
        <div class="row">
            <input type="text" id="new-person-name" placeholder="輸入名字 (如: 小明)">
            <button onclick="addPerson()" style="background:#3498db; color:white; border:none; border-radius:5px; padding:0 15px; cursor:pointer;">新增</button>
        </div>
        <div id="people-tags-container" style="margin-top: 10px;"></div>
    </div>

    <div id="settlement-panel" class="panel">
        <h4 style="text-align:center; color:#d35400;">💰 結算清單 (誰該給誰)</h4>
        <div id="settlement-results"></div>
    </div>

    <div class="input-group" id="input-group">
        <div class="row">
            <input type="text" id="item-name" placeholder="項目 (如：的士)">
        </div>
        <div class="row">
            <select id="currency-select"></select>
            <input type="number" id="item-amount" placeholder="金額">
        </div>
        
        <div class="row" style="align-items: center; margin-bottom: 10px;">
            <span style="font-size: 14px; color: #555; white-space: nowrap;">💳 誰代墊：</span>
            <select id="payer-select"></select>
        </div>
        
        <div style="font-size: 14px; color: #555; margin-bottom: 5px;">✅ 誰要平分這筆錢：</div>
        <div id="checkbox-container" class="checkbox-group"></div>

        <button id="add-btn" class="primary-btn">新增紀錄</button>
    </div>

    <div id="expense-list"></div>

    <div class="total-section">
        <div>總支出 (HKD)</div>
        <div class="total-amount">HK$ <span id="total-sum">0</span></div>
    </div>

    <div class="action-buttons">
        <button class="export-btn" onclick="exportToCSV()">📊 匯出 CSV</button>
        <button class="settle-btn" onclick="showSettlement()">💰 檢視結算</button>
    </div>
    
    <button class="clear-btn" onclick="clearAllExpenses()">🗑️ 一鍵清空 (開啟新旅程)</button>
</div>

<script>
    const defaultRates = { "JPY": 0.052, "USD": 7.8, "KRW": 0.0055, "EUR": 8.4, "TWD": 0.25, "RMB": 1.08, "HKD": 1.0 };
    let savedRates = JSON.parse(localStorage.getItem('travel_rates_hk')) || {};
    let rates = { ...defaultRates, ...savedRates };
    
    let peopleList = JSON.parse(localStorage.getItem('travel_people_hk')) || ["我自己"];
    let expenses = JSON.parse(localStorage.getItem('travel_data_hk')) || [];
    
    let editingId = null;

    initRateSettings();
    updateCurrencyDropdown();
    renderPeoplePanel();
    updatePayerDropdown(); 
    renderCheckboxes();
    renderExpenses();

    function togglePanel(panelId) {
        document.getElementById('settings').style.display = 'none';
        document.getElementById('people-panel').style.display = 'none';
        document.getElementById('settlement-panel').style.display = 'none';
        const panel = document.getElementById(panelId);
        panel.style.display = 'block';
    }

    function initRateSettings() {
        const container = document.getElementById('rate-inputs-container');
        container.innerHTML = '';
        for (let cur in rates) {
            if (cur === "HKD") continue;
            container.innerHTML += `<div class="rate-input"><span>${cur}:</span><input type="number" step="0.0001" id="rate-${cur}" value="${rates[cur]}"></div>`;
        }
    }

    function saveRates() {
        for (let cur in rates) {
            if (cur === "HKD") continue;
            rates[cur] = parseFloat(document.getElementById(`rate-${cur}`).value);
        }
        localStorage.setItem('travel_rates_hk', JSON.stringify(rates));
        updateCurrencyDropdown();
        alert("匯率已更新！");
        document.getElementById('settings').style.display = 'none';
    }

    function updateCurrencyDropdown() {
        const select = document.getElementById('currency-select');
        select.innerHTML = '';
        for (let cur in rates) {
            select.innerHTML += `<option value="${rates[cur]}">${cur} (匯率:${rates[cur]})</option>`;
        }
    }

    function updatePayerDropdown() {
        const select = document.getElementById('payer-select');
        select.innerHTML = '';
        peopleList.forEach(name => {
            select.innerHTML += `<option value="${name}">${name}</option>`;
        });
    }

    function addPerson() {
        const nameInput = document.getElementById('new-person-name');
        const name = nameInput.value.trim();
        if (name && !peopleList.includes(name)) {
            peopleList.push(name);
            savePeopleData();
            nameInput.value = '';
        } else if (peopleList.includes(name)) {
            alert("這個名字已經存在囉！");
        }
    }

    function deletePerson(name) {
        if (!confirm(`確定要刪除 ${name} 嗎？這不會刪除已記的帳，但可能會影響顯示。`)) return;
        peopleList = peopleList.filter(p => p !== name);
        savePeopleData();
    }

    function savePeopleData() {
        localStorage.setItem('travel_people_hk', JSON.stringify(peopleList));
        renderPeoplePanel();
        renderCheckboxes();
        updatePayerDropdown(); 
    }

    function renderPeoplePanel() {
        const container = document.getElementById('people-tags-container');
        container.innerHTML = '';
        peopleList.forEach(name => {
            container.innerHTML += `<div class="person-tag">${name} <button onclick="deletePerson('${name}')">x</button></div>`;
        });
    }

    function renderCheckboxes() {
        const container = document.getElementById('checkbox-container');
        container.innerHTML = '';
        if (peopleList.length === 0) {
            container.innerHTML = '<span style="color:#e74c3c; font-size:14px;">請先新增人員！</span>';
            return;
        }
        peopleList.forEach(name => {
            container.innerHTML += `<label><input type="checkbox" class="person-cb" value="${name}" checked> ${name}</label>`;
        });
    }

    document.getElementById('add-btn').addEventListener('click', () => {
        const name = document.getElementById('item-name').value.trim();
        const rawAmount = parseFloat(document.getElementById('item-amount').value);
        const rate = parseFloat(document.getElementById('currency-select').value);
        const curName = document.getElementById('currency-select').selectedOptions[0].text.split(' ')[0];
        const payer = document.getElementById('payer-select').value; 

        const checkboxes = document.querySelectorAll('.person-cb:checked');
        const selectedPeople = Array.from(checkboxes).map(cb => cb.value);

        if (!name || isNaN(rawAmount)) {
            alert("請填寫完整的項目與金額！"); return;
        }
        if (selectedPeople.length === 0) {
            alert("請至少勾選一位分擔的人員！"); return;
        }
        if (!payer) {
            alert("請選擇是誰代墊的！"); return;
        }

        const hkdTotal = parseFloat((rawAmount * rate).toFixed(1)); 
        
        if (editingId) {
            const index = expenses.findIndex(item => item.id === editingId);
            if (index !== -1) {
                expenses[index] = {
                    ...expenses[index],
                    name, curName, rawAmount, hkdTotal, payer,
                    peopleList: selectedPeople,
                    peopleCount: selectedPeople.length 
                };
            }
            cancelEditMode();
        } else {
            const entry = { 
                id: Date.now(), 
                name, curName, rawAmount, hkdTotal, payer, 
                peopleList: selectedPeople,
                peopleCount: selectedPeople.length 
            };
            expenses.push(entry);
        }
        
        localStorage.setItem('travel_data_hk', JSON.stringify(expenses));
        renderExpenses();
        
        document.getElementById('item-name').value = '';
        document.getElementById('item-amount').value = '';
        renderCheckboxes(); 
    });

    function editItem(id) {
        const item = expenses.find(i => i.id === id);
        if (!item) return;

        editingId = id; 

        document.getElementById('item-name').value = item.name;
        document.getElementById('item-amount').value = item.rawAmount;
        document.getElementById('payer-select').value = item.payer;

        const currencySelect = document.getElementById('currency-select');
        for (let i = 0; i < currencySelect.options.length; i++) {
            if (currencySelect.options[i].text.startsWith(item.curName)) {
                currencySelect.selectedIndex = i;
                break;
            }
        }

        const checkboxes = document.querySelectorAll('.person-cb');
        checkboxes.forEach(cb => {
            cb.checked = item.peopleList.includes(cb.value);
        });

        const btn = document.getElementById('add-btn');
        btn.innerText = "💾 更新紀錄";
        btn.style.backgroundColor = "#f39c12"; 
        document.getElementById('input-group').classList.add('edit-mode');

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEditMode() {
        editingId = null;
        const btn = document.getElementById('add-btn');
        btn.innerText = "新增紀錄";
        btn.style.backgroundColor = "#2ecc71"; 
        document.getElementById('input-group').classList.remove('edit-mode');
    }

    function deleteItem(id) {
        if(!confirm("確定刪除這筆紀錄？")) return;
        expenses = expenses.filter(i => i.id !== id);
        localStorage.setItem('travel_data_hk', JSON.stringify(expenses));
        renderExpenses();
        if (editingId === id) cancelEditMode();
    }

    function clearAllExpenses() {
        if (expenses.length === 0) {
            alert("目前沒有任何紀錄喔！");
            return;
        }
        
        const warningMessage = "⚠️ 警告：確定要清空所有紀錄嗎？\n\n強烈建議您在清空前先點擊「📊 匯出 CSV」備份。\n點擊「確定」將會刪除所有帳目且無法復原！";
        
        if (confirm(warningMessage)) {
            expenses = [];
            localStorage.removeItem('travel_data_hk');
            document.getElementById('settlement-panel').style.display = 'none';
            renderExpenses();
            cancelEditMode(); 
            alert("紀錄已清空，祝您下一趟旅程愉快！✈️");
        }
    }

    function renderExpenses() {
        const list = document.getElementById('expense-list');
        list.innerHTML = '';
        let totalHKD = 0;
        
        [...expenses].reverse().forEach(item => {
            totalHKD += item.hkdTotal;
            const perPerson = (item.hkdTotal / item.peopleCount).toFixed(1);
            const peopleStr = item.peopleList.join(', ');

            list.innerHTML += `
                <div class="item">
                    <div style="flex:1;">
                        <div class="payer-badge">💳 ${item.payer} 先付</div>
                        <div class="item-name" style="font-weight:bold; color:#333;">${item.name}</div>
                        <small style="color:#777;">${item.rawAmount} ${item.curName}</small>
                        <div class="people-list">🙋‍♂️ 分攤: ${peopleStr}</div>
                    </div>
                    <div style="text-align:right">
                        <span class="hkd-amount">HK$ ${item.hkdTotal}</span><br>
                        <small>每人 HK$ ${perPerson}</small>
                    </div>
                    <div class="item-actions">
                        <button class="edit-btn" onclick="editItem(${item.id})">✏️</button>
                        <button class="delete-btn" onclick="deleteItem(${item.id})">✖️</button>
                    </div>
                </div>
            `;
        });
        
        document.getElementById('total-sum').innerText = totalHKD.toFixed(1);
    }

    function showSettlement() {
        if (expenses.length === 0) {
            alert("還沒有記帳紀錄喔！"); return;
        }

        let pairwiseDebts = {};
        let debtDetails = {}; 

        let allInvolvedPeople = new Set(peopleList);
        expenses.forEach(e => {
            allInvolvedPeople.add(e.payer);
            e.peopleList.forEach(p => allInvolvedPeople.add(p));
        });
        let uniquePeople = Array.from(allInvolvedPeople);

        uniquePeople.forEach(p => {
            pairwiseDebts[p] = {};
            debtDetails[p] = {};
            uniquePeople.forEach(p2 => {
                if (p !== p2) {
                    pairwiseDebts[p][p2] = 0;
                    debtDetails[p][p2] = [];
                }
            });
        });

        expenses.forEach(exp => {
            const splitAmount = exp.hkdTotal / exp.peopleCount;
            const payer = exp.payer;
            
            exp.peopleList.forEach(person => {
                if (person !== payer) {
                    pairwiseDebts[person][payer] += splitAmount;
                    debtDetails[person][payer].push(exp.name);
                }
            });
        });

        let finalDebts = {}; 
        let processedPairs = new Set();

        uniquePeople.forEach(p1 => {
            uniquePeople.forEach(p2 => {
                if (p1 === p2) return;
                
                let pairKey = [p1, p2].sort().join('-');
                if (processedPairs.has(pairKey)) return;
                processedPairs.add(pairKey);

                let p1OwesP2 = pairwiseDebts[p1][p2];
                let p2OwesP1 = pairwiseDebts[p2][p1];
                let net = p1OwesP2 - p2OwesP1;
                
                let allReasons = [...debtDetails[p1][p2], ...debtDetails[p2][p1]];
                let uniqueReasons = [...new Set(allReasons)].slice(0, 5).join(", ");
                if (allReasons.length > 5) uniqueReasons += "...等";

                if (net > 0.5) {
                    if (!finalDebts[p1]) finalDebts[p1] = [];
                    finalDebts[p1].push({ creditor: p2, amount: net, reasons: uniqueReasons });
                } else if (net < -0.5) {
                    if (!finalDebts[p2]) finalDebts[p2] = [];
                    finalDebts[p2].push({ creditor: p1, amount: Math.abs(net), reasons: uniqueReasons });
                }
            });
        });

        const resultsContainer = document.getElementById('settlement-results');
        resultsContainer.innerHTML = '';

        if (Object.keys(finalDebts).length === 0) {
            resultsContainer.innerHTML = "<p style='text-align:center; color:#27ae60; font-weight:bold; padding:20px;'>🎉 完美！大家互不相欠！</p>";
        } else {
            for (let debtor in finalDebts) {
                let debtList = finalDebts[debtor];
                let cardHtml = `<div class="debtor-card">
                    <div class="debtor-name">👤 ${debtor} 需要支付：</div>`;
                
                debtList.forEach(d => {
                    cardHtml += `
                        <div class="debt-row">
                            <div class="creditor-info">
                                ➡️ 給 ${d.creditor}
                                <span class="debt-reason">(${d.reasons || '雜項'})</span>
                            </div>
                            <div class="debt-amount">HK$ ${d.amount.toFixed(1)}</div>
                        </div>
                    `;
                });
                
                cardHtml += `</div>`;
                resultsContainer.innerHTML += cardHtml;
            }
        }

        togglePanel('settlement-panel');
        document.getElementById('settlement-panel').scrollIntoView({ behavior: 'smooth' });
    }

    function exportToCSV() {
        if (expenses.length === 0) {
            alert("目前沒有任何紀錄可以匯出喔！"); return;
        }

        let csvContent = "\uFEFF"; 
        csvContent += "項目名稱,幣別,外幣金額,港幣總計,付款人,分攤人數,參與人員,每人分攤港幣\n";

        expenses.forEach(item => {
            let perPerson = (item.hkdTotal / item.peopleCount).toFixed(1);
            let safeName = `"${item.name.replace(/"/g, '""')}"`; 
            let safePeople = `"${item.peopleList.join(', ')}"`;
            let row = `${safeName},${item.curName},${item.rawAmount},${item.hkdTotal},${item.payer},${item.peopleCount},${safePeople},${perPerson}`;
            csvContent += row + "\n";
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "HK_travel_expenses.csv"); 
        
        document.body.appendChild(link);
        link.click(); 
        document.body.removeChild(link); 
    }
</script>

</body>
</html>
